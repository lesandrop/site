<style>

        max-width: 100%;

<div id="bsky-timeline">
    <div class="bsky-loading">A carregar publicações do Bluesky...</div>
</div>

<script>
    (async function() {
        const target = document.getElementById('bsky-timeline');
        const DID = 'did:plc:7qlqohqw2d7sb37ljbohpe5f';
        // Aumentei o limite para 5 para não sobrecarregar a página de ensino
        const API = `https://bsky.app{DID}&limit=5`;

        try {
            const res = await fetch(API);
            if (!res.ok) throw new Error();
            const data = await res.json();
            target.innerHTML = '';

            data.feed.forEach(({ post }) => {
                // Filtra para mostrar apenas posts do próprio autor (ignora reposts se preferires)
                if (post.author.did !== DID) return;

                const date = new Date(post.record.createdAt).toLocaleDateString('pt-PT', {day:'2-digit', month:'short', year:'numeric'});
                let imageHtml = '';
                
                if (post.embed?.images) {
                    imageHtml = `<img src="${post.embed.images[0].thumb}" class="bsky-img" loading="lazy">`;
                }

                const postUrl = `https://bsky.app{post.author.handle}/post/${post.uri.split('/').pop()}`;

                target.innerHTML += `
                    <a href="${postUrl}" target="_blank" class="bsky-post">
                        <img src="${post.author.avatar}" class="bsky-avatar">
                        <div class="bsky-body">
                            <div class="bsky-header">
                                <span class="bsky-name">${post.author.displayName || post.author.handle}</span>
                                <span class="bsky-handle">@${post.author.handle}</span>
                                <span class="bsky-date"> · ${date}</span>
                            </div>
                            <div class="bsky-content">${post.record.text}</div>
                            ${imageHtml}
                            <div class="bsky-stats">
                                <span>💬 ${post.replyCount}</span>
                                <span>🔄 ${post.repostCount}</span>
                                <span>❤️ ${post.likeCount}</span>
                            </div>
                        </div>
                    </a>`;
            });
            
            if (target.innerHTML === '') {
                target.innerHTML = '<div class="bsky-loading">Sem publicações recentes.</div>';
            }
        } catch (e) {
            target.innerHTML = '<div class="bsky-loading">Ligação ao Bluesky temporariamente indisponível.</div>';
        }
    })();
</script>
